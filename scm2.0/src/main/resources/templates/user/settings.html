<!doctype html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title})}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | SCM</title>
  </head>
  <body>
    <div id="content">
      <style>
        *,
        *::before,
        *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        :root {
          --accent: #3b7ef8;
          --accent2: #8b5cf6;
          --accent3: #10b981;
          --text: #0f172a;
          --muted: #64748b;
          --surface: #f8f9fc;
          --border: rgba(0, 0, 0, 0.08);
        }
        body {
          background: #fff !important;
          font-family: "DM Sans", sans-serif;
        }

        .settings-wrap {
          margin-left: 240px;
          padding: 5rem 2.5rem 4rem;
          min-height: 100vh;
          max-width: 640px;
        }

        .pg-label {
          font-size: 0.72rem;
          font-weight: 600;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: var(--accent);
          margin-bottom: 0.4rem;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .pg-label::before {
          content: "";
          width: 20px;
          height: 1.5px;
          background: var(--accent);
        }
        .pg-title {
          font-family: "Syne", sans-serif;
          font-size: 2rem;
          font-weight: 700;
          color: var(--text);
          margin-bottom: 0.3rem;
        }
        .pg-sub {
          font-size: 0.9rem;
          color: var(--muted);
          margin-bottom: 2.5rem;
        }

        /* Card */
        .pw-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 2.4rem;
          position: relative;
          overflow: hidden;
          box-shadow: 0 2px 16px rgba(0, 0, 0, 0.05);
        }
        .pw-card::before {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 3px;
          background: linear-gradient(
            90deg,
            var(--accent),
            var(--accent2),
            var(--accent3)
          );
        }

        /* Orbs */
        .orb {
          position: absolute;
          border-radius: 50%;
          pointer-events: none;
        }
        .orb1 {
          width: 180px;
          height: 180px;
          background: radial-gradient(
            circle,
            rgba(59, 126, 248, 0.06),
            transparent 70%
          );
          top: -50px;
          right: -50px;
        }
        .orb2 {
          width: 120px;
          height: 120px;
          background: radial-gradient(
            circle,
            rgba(139, 92, 246, 0.06),
            transparent 70%
          );
          bottom: -30px;
          left: -30px;
        }

        .card-icon {
          width: 48px;
          height: 48px;
          border-radius: 14px;
          background: rgba(59, 126, 248, 0.1);
          display: flex;
          align-items: center;
          justify-content: center;
          color: var(--accent);
          margin-bottom: 1.2rem;
        }
        .card-title {
          font-family: "Syne", sans-serif;
          font-size: 1.15rem;
          font-weight: 700;
          color: var(--text);
          margin-bottom: 0.3rem;
        }
        .card-sub {
          font-size: 0.84rem;
          color: var(--muted);
          margin-bottom: 1.8rem;
        }

        /* Form fields */
        .field {
          margin-bottom: 1.3rem;
        }
        .field label {
          display: block;
          font-size: 0.75rem;
          font-weight: 600;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 0.5rem;
        }
        .input-wrap {
          position: relative;
        }
        .input-icon {
          position: absolute;
          left: 14px;
          top: 50%;
          transform: translateY(-50%);
          color: var(--muted);
          pointer-events: none;
        }
        .field input {
          width: 100%;
          padding: 0.8rem 3rem 0.8rem 2.8rem;
          border: 1.5px solid var(--border);
          border-radius: 10px;
          font-family: "DM Sans", sans-serif;
          font-size: 0.92rem;
          color: var(--text);
          background: #fff;
          outline: none;
          transition:
            border-color 0.2s,
            box-shadow 0.2s;
        }
        .field input:focus {
          border-color: var(--accent);
          box-shadow: 0 0 0 3px rgba(59, 126, 248, 0.1);
        }
        .field input::placeholder {
          color: #cbd5e1;
        }

        /* Toggle password visibility */
        .toggle-pw {
          position: absolute;
          right: 13px;
          top: 50%;
          transform: translateY(-50%);
          background: none;
          border: none;
          cursor: pointer;
          color: var(--muted);
          padding: 2px;
          transition: color 0.2s;
        }
        .toggle-pw:hover {
          color: var(--accent);
        }

        /* Divider */
        .divider {
          height: 1px;
          background: var(--border);
          margin: 1.6rem 0;
        }

        /* Submit */
        .submit-btn {
          width: 100%;
          padding: 0.9rem;
          border-radius: 10px;
          border: none;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          color: #fff;
          font-family: "Syne", sans-serif;
          font-size: 0.95rem;
          font-weight: 700;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          transition: all 0.25s;
          box-shadow: 0 4px 16px rgba(59, 126, 248, 0.3);
        }
        .submit-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(59, 126, 248, 0.4);
        }

        /* Strength indicator */
        .strength-bar {
          display: flex;
          gap: 4px;
          margin-top: 0.5rem;
        }
        .strength-seg {
          height: 3px;
          flex: 1;
          border-radius: 10px;
          background: var(--border);
          transition: background 0.3s;
        }
        .strength-label {
          font-size: 0.7rem;
          color: var(--muted);
          margin-top: 0.3rem;
        }

        /* Info note */
        .info-note {
          display: flex;
          align-items: flex-start;
          gap: 10px;
          background: rgba(59, 126, 248, 0.06);
          border: 1px solid rgba(59, 126, 248, 0.15);
          border-radius: 10px;
          padding: 0.9rem 1.1rem;
          margin-top: 1.2rem;
          font-size: 0.8rem;
          color: var(--muted);
          line-height: 1.5;
        }
        .info-note svg {
          flex-shrink: 0;
          color: var(--accent);
          margin-top: 1px;
        }

        @media (max-width: 768px) {
          .settings-wrap {
            margin-left: 0;
            padding: 4.5rem 1.2rem 3rem;
          }
        }
      </style>

      <!-- Sidebar -->
      <div data-th-replace="~{user/sidebar::user-sidebar}"></div>

      <div class="settings-wrap">
        <div class="pg-label">Settings</div>
        <h1 class="pg-title">Account Settings</h1>
        <p class="pg-sub">Manage your security and account preferences.</p>

        <div class="pw-card">
          <div class="orb orb1"></div>
          <div class="orb orb2"></div>

          <div class="card-icon">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </div>
          <div class="card-title">Change Password</div>
          <p class="card-sub">
            Choose a strong password to keep your account secure.
          </p>

          <form data-th-action="@{/contact/change-password}" method="post">
            <!-- Old password -->
            <div class="field">
              <label for="oldPassword">Current Password</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg
                    width="15"
                    height="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                </span>
                <input
                  type="password"
                  id="oldPassword"
                  name="oldPassword"
                  placeholder="Enter current password"
                  required
                />
                <button
                  type="button"
                  class="toggle-pw"
                  onclick="togglePw('oldPassword', this)"
                >
                  <svg
                    width="15"
                    height="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="divider"></div>

            <!-- New password -->
            <div class="field">
              <label for="newPassword">New Password</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg
                    width="15"
                    height="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                </span>
                <input
                  type="password"
                  id="newPassword"
                  name="newPassword"
                  placeholder="Enter new password"
                  required
                  oninput="checkStrength(this.value)"
                />
                <button
                  type="button"
                  class="toggle-pw"
                  onclick="togglePw('newPassword', this)"
                >
                  <svg
                    width="15"
                    height="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
              <!-- Strength bar -->
              <div class="strength-bar" id="strengthBar">
                <div class="strength-seg" id="s1"></div>
                <div class="strength-seg" id="s2"></div>
                <div class="strength-seg" id="s3"></div>
                <div class="strength-seg" id="s4"></div>
              </div>
              <div class="strength-label" id="strengthLabel"></div>
            </div>

            <!-- Confirm password -->
            <div class="field">
              <label for="confirmPassword">Confirm New Password</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg
                    width="15"
                    height="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                  </svg>
                </span>
                <input
                  type="password"
                  id="confirmPassword"
                  placeholder="Re-enter new password"
                  required
                  oninput="checkMatch()"
                />
                <button
                  type="button"
                  class="toggle-pw"
                  onclick="togglePw('confirmPassword', this)"
                >
                  <svg
                    width="15"
                    height="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
              <div class="strength-label" id="matchLabel"></div>
            </div>

            <button type="submit" class="submit-btn">
              <svg
                width="15"
                height="15"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
              Update Password
            </button>
          </form>

          <div class="info-note">
            <svg
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Use at least 8 characters with a mix of letters, numbers, and
            symbols for a strong password.
          </div>
        </div>
      </div>

      <script>
        // Toggle password visibility
        function togglePw(id, btn) {
          const input = document.getElementById(id);
          input.type = input.type === "password" ? "text" : "password";
          btn.style.color =
            input.type === "text" ? "var(--accent)" : "var(--muted)";
        }

        // Password strength checker
        function checkStrength(val) {
          const segs = ["s1", "s2", "s3", "s4"];
          const colors = ["#ef4444", "#f59e0b", "#3b7ef8", "#10b981"];
          const labels = ["Too weak", "Fair", "Good", "Strong 💪"];
          let score = 0;
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[^A-Za-z0-9]/.test(val)) score++;

          segs.forEach((id, i) => {
            document.getElementById(id).style.background =
              i < score ? colors[score - 1] : "var(--border)";
          });
          document.getElementById("strengthLabel").textContent = val
            ? labels[score - 1] || ""
            : "";
          document.getElementById("strengthLabel").style.color =
            score > 0 ? colors[score - 1] : "var(--muted)";
        }

        // Match checker
        function checkMatch() {
          const pw = document.getElementById("newPassword").value;
          const cpw = document.getElementById("confirmPassword").value;
          const lbl = document.getElementById("matchLabel");
          if (!cpw) {
            lbl.textContent = "";
            return;
          }
          if (pw === cpw) {
            lbl.textContent = "✓ Passwords match";
            lbl.style.color = "#10b981";
          } else {
            lbl.textContent = "✗ Passwords do not match";
            lbl.style.color = "#ef4444";
          }
        }
      </script>
    </div>
  </body>
</html>
