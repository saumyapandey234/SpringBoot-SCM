<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #9face6);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .form-container {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.2);
        width: 320px;
        text-align: center;
        transition: transform 0.3s ease;
      }

      .form-container:hover {
        transform: scale(1.02);
      }

      h2 {
        margin-bottom: 1rem;
        color: #333;
      }

      label {
        display: block;
        text-align: left;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #444;
      }

      input[type="email"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.3s;
      }

      input[type="email"]:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 6px rgba(108, 99, 255, 0.4);
      }

      button {
        width: 100%;
        padding: 10px;
        background: #6c63ff;
        color: white;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      button:hover {
        background: #574bff;
      }

      .note {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Forgot Password?</h2>
      <form action="/send-otp" method="post">
        <label for="email">Enter your email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
        />
        <button type="submit">Send OTP</button>
      </form>
      <p class="note">We’ll send you a reset link.</p>
    </div>
  </body>
</html>
