name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: scm2.0

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scm2.0/target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f "scm2.0" || true
            sleep 2
            mkdir -p /home/ubuntu/app
            nohup java \
              -DDB_URL="${{ secrets.DB_URL }}" \
              -DDB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -DDB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -DGOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -DGOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -DGIT_CLIENT_ID="${{ secrets.GIT_CLIENT_ID }}" \
              -DGIT_CLIENT_SECRET="${{ secrets.GIT_CLIENT_SECRET }}" \
              -DCLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
              -DCLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
              -DCLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
              -DRAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
              -DRAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
              -DEMAILJS_PUBLIC_KEY="${{ secrets.EMAILJS_PUBLIC_KEY }}" \
              -DEMAILJS_SERVICE_ID="${{ secrets.EMAILJS_SERVICE_ID }}" \
              -DEMAILJS_TEMPLATE_ID="${{ secrets.EMAILJS_TEMPLATE_ID }}" \
              -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &
            disown
            echo "Deployed successfully!"
