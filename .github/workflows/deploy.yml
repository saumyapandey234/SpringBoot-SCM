name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: scm2.0

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scm2.0/target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            # Kill existing process if running
            pkill -f "scm2.0" || true
            sleep 2

            mkdir -p /home/ubuntu/app

            # Write a dedicated start script to avoid SSH session issues
            cat > /home/ubuntu/app/start.sh << 'EOF'
            #!/bin/bash
            exec java -jar /home/ubuntu/app/*.jar \
              --spring.datasource.url="$DB_URL" \
              --spring.datasource.username="$DB_USERNAME" \
              --spring.datasource.password="$DB_PASSWORD" \
              --spring.security.oauth2.client.registration.google.client-id="$GOOGLE_CLIENT_ID" \
              --spring.security.oauth2.client.registration.google.client-secret="$GOOGLE_CLIENT_SECRET" \
              --spring.security.oauth2.client.registration.github.client-id="$GIT_CLIENT_ID" \
              --spring.security.oauth2.client.registration.github.client-secret="$GIT_CLIENT_SECRET" \
              --cloudinary.cloud-name="$CLOUDINARY_CLOUD_NAME" \
              --cloudinary.api-key="$CLOUDINARY_API_KEY" \
              --cloudinary.api-secret="$CLOUDINARY_API_SECRET" \
              --razorpay.key.id="$RAZORPAY_KEY_ID" \
              --razorpay.key.secret="$RAZORPAY_KEY_SECRET" \
              --emailjs.public-key="$EMAILJS_PUBLIC_KEY" \
              --emailjs.service-id="$EMAILJS_SERVICE_ID" \
              --emailjs.template-id="$EMAILJS_TEMPLATE_ID" \
              >> /home/ubuntu/app/app.log 2>&1
            EOF

            chmod +x /home/ubuntu/app/start.sh

            # Export all secrets as env vars for the start script
            export DB_URL="${{ secrets.DB_URL }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            export GIT_CLIENT_ID="${{ secrets.GIT_CLIENT_ID }}"
            export GIT_CLIENT_SECRET="${{ secrets.GIT_CLIENT_SECRET }}"
            export CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            export CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}"
            export CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"
            export RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}"
            export RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}"
            export EMAILJS_PUBLIC_KEY="${{ secrets.EMAILJS_PUBLIC_KEY }}"
            export EMAILJS_SERVICE_ID="${{ secrets.EMAILJS_SERVICE_ID }}"
            export EMAILJS_TEMPLATE_ID="${{ secrets.EMAILJS_TEMPLATE_ID }}"

            # setsid fully detaches from the SSH session's process group
            setsid /home/ubuntu/app/start.sh &

            sleep 5
            echo "Deployed successfully!"
